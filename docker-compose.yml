services:
  bash:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./home:/home
      - ./home/github/.pi:/root/.pi
      - ./home/github:/github

  ggml:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./home/github/.pi:/root/.pi
      - ./home/ggml:/home/ggml
      - ./home/models:/home/ggml/models
      - ./home/pi:/home/pi

  pi:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./home/github/.pi:/root/.pi
      - ./home/pi:/home
      - ./home/github:/github

